<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>社會處方全健經理：像素戰鬥冒險 HD</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+HK:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --pixel-bg: linear-gradient(to bottom, #87CEEB, #E0F6FF), url('https://img.itch.zone/aW1nLzU3MTY0MDAucG5n/original/x21p04.png');
    }

    body {
      margin: 0;
      padding: 10px;
      background-color: #1a1a1a;
      font-family: 'Noto Sans HK', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    #game-container {
      width: 100%;
      max-width: 800px;
      background: #000;
      border: 4px solid #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
      position: relative;
    }

    /* 戰鬥舞台 */
    #battle-stage {
      height: 350px;
      background: var(--pixel-bg);
      background-size: cover;
      background-position: center bottom;
      position: relative;
      overflow: hidden;
      transition: background 0.5s ease;
    }

    /* 精緻復古狀態欄 */
    .status-box {
      position: absolute;
      background: rgba(250, 250, 250, 0.96);
      border: 3px solid #333;
      border-radius: 4px;
      padding: 10px 14px;
      width: 240px;
      box-shadow: 3px 3px 0 #000;
      z-index: 5;
    }
    
    #enemy-status { top: 20px; left: 20px; }
    #player-status { bottom: 25px; right: 20px; }

    .status-name {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 4px;
      color: #111;
      display: flex;
      justify-content: space-between;
    }

    .status-meta { font-size: 11px; color: #555; margin-bottom: 6px; font-weight: bold; }

    /* 寶可夢風格經典血條 */
    .hp-container {
      background: #444;
      border: 2px solid #000;
      height: 14px;
      border-radius: 3px;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
    }

    .hp-tag {
      background: #ffcb05;
      color: #1d2c5e;
      font-family: 'Press Start 2P', sans-serif;
      font-size: 8px;
      padding: 0 4px;
      height: 100%;
      display: flex;
      align-items: center;
      font-weight: bold;
      border-right: 2px solid #000;
    }

    .hp-bar-wrapper { flex-grow: 1; height: 100%; background: #222; }

    .hp-bar {
      width: 0%; 
      height: 100%;
      transition: width 0.6s cubic-bezier(0.1, 0.8, 0.3, 1), background-color 0.4s;
    }

    .hp-red { background-color: #ff3c3c; }
    .hp-yellow { background-color: #ffcc00; }
    .hp-green { background-color: #51da46; }

    .hp-label {
      font-size: 10px;
      text-align: right;
      margin-top: 4px;
      font-family: 'Press Start 2P', sans-serif;
      color: #222;
    }

    /* 角色精靈圖容器 */
    .sprite-container {
      position: absolute;
      width: 140px;
      height: 140px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 上方：參加者位置 */
    #enemy-position {
      right: 70px;
      top: 45px;
      animation: sprite-float 2.8s ease-in-out infinite;
    }

    /* 下方：全健經理位置 */
    #player-position {
      left: 70px;
      bottom: 25px;
      animation: sprite-float 3.2s ease-in-out infinite alternate;
    }

    .pixel-avatar-hd {
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.15));
    }

    /* 動態回饋動畫特效 */
    @keyframes jump-joy {
      0%, 100% { transform: translateY(0) scale(1); }
      30% { transform: translateY(-25px) scaleY(1.15) scaleX(0.9); }
      50% { transform: translateY(0) scaleY(0.85) scaleX(1.1); }
      70% { transform: translateY(-10px) scaleY(1.05); }
    }
    .animate-jump { animation: jump-joy 0.6s ease-out 2; }

    @keyframes shake-hurt {
      0%, 100% { transform: translate(0, 0); }
      20% { transform: translate(-12px, 2px); }
      40% { transform: translate(10px, -4px); }
      60% { transform: translate(-6px, 4px); }
      80% { transform: translate(6px, -2px); }
    }
    .animate-shake { animation: shake-hurt 0.4s ease-in-out; }

    @keyframes sprite-float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    /* 粒子特效 */
    #particle-container {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
    }
    .particle {
      position: absolute; width: 10px; height: 10px; border-radius: 2px;
      animation: particle-fly 0.7s forwards cubic-bezier(0.1, 0.8, 0.3, 1);
    }
    @keyframes particle-fly {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
      100% { transform: translate(var(--mx), var(--my)) scale(0) rotate(270deg); opacity: 0; }
    }

    /* 對話框與 2x2 選單控制區 */
    #control-section {
      background: #f4f4f4;
      border-top: 4px solid #333;
      padding: 14px;
      min-height: 150px;
      box-sizing: border-box;
      display: grid;
      grid-template-columns: 55% 45%;
    }

    #dialogue-box {
      border: 3px solid #444;
      background: #fff;
      border-radius: 5px;
      padding: 12px;
      font-size: 16px;
      line-height: 1.6;
      color: #111;
      position: relative;
      box-shadow: inset 2px 2px 0 rgba(0,0,0,0.05);
    }

    #quest-progress {
      position: absolute;
      top: 6px; right: 10px;
      font-size: 11px;
      color: #888;
      font-family: 'Press Start 2P', sans-serif;
    }

    #options-box {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 8px;
      padding-left: 12px;
    }

    .action-btn {
      background: #fff;
      border: 3px solid #444;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      font-family: 'Noto Sans HK', sans-serif;
      padding: 8px;
      text-align: left;
      display: flex;
      align-items: center;
      transition: all 0.1s;
      box-shadow: inset -3px -3px 0 #ddd, 2px 2px 0 rgba(0,0,0,0.1);
    }

    .action-btn::before {
      content: '▶'; margin-right: 6px; color: transparent; font-size: 11px;
    }
    .action-btn:hover::before { color: #ff3c3c; }
    .action-btn:active { transform: translate(1px, 1px); box-shadow: inset -1px -1px 0 #ddd; }

    .full-width-next {
      grid-column: span 2; grid-row: span 2;
      text-align: center !important; justify-content: center;
      background-color: #2e7d32 !important; color: white !important;
      box-shadow: inset -3px -3px 0 #1b5e20 !important; font-size: 16px;
    }

    #system-controls {
      display: flex; justify-content: space-between; max-width: 800px; width: 100%; margin-top: 10px;
    }
    .sys-btn {
      background: #333; color: #fff; border: none; padding: 10px 16px; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: bold;
    }

    #summary-screen {
      display: none; padding: 30px 20px; text-align: center; background: white; color: #333;
    }

    @media(max-width: 650px) {
      #control-section { grid-template-columns: 1fr; gap: 12px; }
      #options-box { padding-left: 0; min-height: 130px; }
      #battle-stage { height: 290px; }
      #enemy-position { right: 15px; top: 15px; }
      #player-position { left: 15px; bottom: 15px; }
    }
  </style>
</head>

  <div>

      <div id="control-section">

  </div>

        { text: "介紹至街坊棋藝室參與室內象棋對弈", score: 7.5, feedback: "有社交成分，但對於熱愛戶外活動的他吸引力不足。", type: "water" },
        { text: "建議學習操作最新跨國主流社群軟體", score: 5, feedback: "線上互動缺乏溫度，難以取代實體退休生活的空虛。", type: "electric" },
        { text: "推薦待在家中收看各國精采旅遊全紀錄", score: 2.5, feedback: "越看越渴望外出的同時卻更顯孤單，社交孤立未被解決。", type: "fire" }
      ] }
    ];

    let currentIdx = 0;
    let totalScore = 0; // 下方玩家累積總得分
    let isTyping = false;
    let currentBgmStatus = false;
    let envType = 'home';

    const playerSex = ['♂', '♀'][Math.floor(Math.random() * 2)];
    document.getElementById('lbl-player-sex').innerText = playerSex;

    // 🎨 高畫質像素 SVG 動態繪製引擎 (包含豐富細節與即時表情包變化)
    function generateHQPixelAvatar(name, age, sex, mood) {
      let skin = "#ffcc99";
      let skinShadow = "#e6a573";
      let hair = age > 65 ? "#e0e0e0" : (sex === "♂" ? "#5a3d28" : "#804000");
      let hairShadow = age > 65 ? "#b8b8b8" : (sex === "♂" ? "#3d2a1c" : "#592d00");
      let shirt = sex === "♂" ? "#315bb0" : "#d12359";
      
      // 表情矩陣參數設定
      let eyePath = "", mouthPath = "", blush = "", emoExtras = "";
      
      if (mood === null || mood === 7.5) { // 預設 / 微笑
        eyePath = `<rect x="5" y="6" width="2" height="2" fill="#222"/><rect x="11" y="6" width="2" height="2" fill="#222"/>`;
        mouthPath = `<path d="M6 10 L7 11 L11 11 L12 10" stroke="#000" stroke-width="1" fill="none"/>`;
        if (mood === 7.5) blush = `<rect x="4" y="8" width="2" height="1" fill="#ff9999" opacity="0.6"/><rect x="12" y="8" width="2" height="1" fill="#ff9999" opacity="0.6"/>`;
      } 
      else if (mood === 10) { // 🌟 大正解：滿分狂喜 (眼睛瞇起、張嘴大笑、閃光特效)
        eyePath = `<path d="M4 7 L6 5 L7 7" stroke="#222" stroke-width="1.5" fill="none"/><path d="M11 7 L12 5 L14 7" stroke="#222" stroke-width="1.5" fill="none"/>`;
        mouthPath = `<path d="M6 9 Q8 13 12 9 Z" fill="#b32424" stroke="#000" stroke-width="1"/>`;
        blush = `<rect x="4" y="8" width="2" height="1.5" fill="#ff4d4d" opacity="0.8"/><rect x="12" y="8" width="2" height="1.5" fill="#ff4d4d" opacity="0.8"/>`;
        emoExtras = `
          <polygon points="2,3 3,1 4,3 6,4 4,5 3,7 2,5 0,4" fill="#ffcc00"/>
          <polygon points="14,3 15,1 16,3 18,4 16,5 15,7 14,5 12,4" fill="#ffcc00"/>
        `;
      } 
      else if (mood === 5) { // 😐 扣分：平淡/無感 (眼睛變大呆滯、嘴巴成直線)
        eyePath = `<rect x="5" y="6" width="2" height="2" fill="#444"/><rect x="11" y="6" width="2" height="2" fill="#444"/><rect x="6" y="6" width="1" height="1" fill="#fff"/><rect x="12" y="6" width="1" height="1" fill="#fff"/>`;
        mouthPath = `<line x1="6.5" y1="10" x2="11.5" y2="10" stroke="#444" stroke-width="1.5"/>`;
      } 
      else if (mood === 2.5) { // 😓 扣大分：流汗、黑線、八字難過眉
        eyePath = `<rect x="5" y="7" width="2" height="2" fill="#222"/><rect x="11" y="7" width="2" height="2" fill="#222"/>`;
        mouthPath = `<path d="M7 11 Q9 9 11 11" stroke="#000" stroke-width="1.5" fill="none"/>`;
        // 八字眉與黑線陰影
        emoExtras = `
          <line x1="4" y1="5" x2="7" y2="6" stroke="#000" stroke-width="1.5"/>
          <line x1="14" y1="5" x2="11" y2="6" stroke="#000" stroke-width="1.5"/>
          <rect x="2" y="5" width="2" height="3" fill="#3399ff"/>
          <rect x="3" y="8" width="1" height="2" fill="#3399ff"/>
          <rect x="4" y="3" width="10" height="1.5" fill="#1d2c5e" opacity="0.3"/>
        `;
      }

      // 年紀專屬特徵
      let ageDetails = "";
      if(age > 65) {
        // 皺紋線與老花眼鏡外框
        ageDetails = `
          <line x1="4" y1="9" x2="6" y2="9" stroke="${skinShadow}"/>
          <line x1="12" y1="9" x2="14" y2="9" stroke="${skinShadow}"/>
          <circle cx="6" cy="7" r="2.5" stroke="#444" stroke-width="1" fill="none"/>
          <circle cx="12" cy="7" r="2.5" stroke="#444" stroke-width="1" fill="none"/>
          <line x1="8.5" y1="6.5" x2="9.5" y2="6.5" stroke="#444"/>
        `;
      }

      return `
        <svg class="pixel-avatar-hd" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="9" cy="15.5" rx="6.5" ry="2" fill="rgba(0,0,0,0.15)"/>
          <rect x="4" y="4" width="10" height="10" fill="${skin}"/>
          <rect x="4" y="13" width="10" height="1" fill="${skinShadow}"/>
          <rect x="3" y="2" width="12" height="3" fill="${hair}"/>
          <rect x="3" y="5" width="2" height="4" fill="${hair}"/>
          <rect x="13" y="5" width="2" height="4" fill="${hair}"/>
          <rect x="3" y="2" width="12" height="1" fill="${hairShadow}"/>
          <path d="M 3 14 L 15 14 L 16 18 L 2 18 Z" fill="${shirt}"/>
          <rect x="8" y="14" width="2" height="1.5" fill="${skin}"/>
          ${eyePath}
          ${mouthPath}
          ${blush}
          ${ageDetails}
          ${emoExtras}
        </svg>
      `;
    }

    // 經理背影渲染
    function generatePlayerBack(sex) {
      let hair = sex === '♂' ? '#222' : '#663300';
      return `
        <svg class="pixel-avatar-hd" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="9" cy="16" rx="6" ry="1.5" fill="rgba(0,0,0,0.2)"/>
          <rect x="5" y="3" width="8" height="7" fill="${hair}"/>
          <path d="M 3 10 L 15 10 L 16 18 L 2 18 Z" fill="#2e7d32"/>
          <rect x="4" y="10" width="10" height="1" fill="#1b5e20"/>
          <rect x="7" y="10" width="4" height="3" fill="#fff9e6"/>
        </svg>
      `;
    }

    document.getElementById('player-position').innerHTML = generatePlayerBack(playerSex);

    function typeWriter(text, callback) {
      isTyping = true;
      document.getElementById('dialogue-text').innerHTML = '';
      let i = 0;
      function type() {
        if (i < text.length) {
          document.getElementById('dialogue-text').innerHTML += text.charAt(i);
          i++;
          setTimeout(type, 18);
        } else {
          isTyping = false;
          if(callback) callback();
        }
      }
      type();
    }

    // 更新下方玩家（累積得分大血條）
    function updatePlayerHpBar(score) {
      const bar = document.getElementById('player-hp');
      bar.style.width = `${score}%`;
      document.getElementById('lbl-player-hp-text').innerText = `${score} / 100`;

      bar.className = 'hp-bar';
      if (score <= 50) bar.classList.add('hp-red');
      else if (score <= 80) bar.classList.add('hp-yellow');
      else bar.classList.add('hp-green');
    }

    // 更新上方參加者（當前題目的單體健康度條，最高10分）
    function updateEnemyHpBar(score) {
      const bar = document.getElementById('enemy-hp');
      let pct = (score / 10) * 100;
      bar.style.width = `${pct}%`;
      document.getElementById('lbl-enemy-hp-text').innerText = `${score} / 10`;

      bar.className = 'hp-bar';
      if (pct <= 30) bar.classList.add('hp-red');
      else if (pct <= 75) bar.classList.add('hp-yellow');
      else bar.classList.add('hp-green');
    }

    function initRound() {
      if(currentIdx >= clients.length) {
        endGame();
        return;
      }

      const client = clients[currentIdx];
      document.getElementById('quest-progress').innerText = `${currentIdx + 1}/10`;
      document.getElementById('lbl-enemy-name').innerText = client.name;
      document.getElementById('lbl-enemy-age').innerText = `Lv.${client.age} (${client.sex})`;
      
      // 預設載入平靜常態的高清像素頭像
      document.getElementById('enemy-position').innerHTML = generateHQPixelAvatar(client.name, client.age, client.sex, null);
      updateEnemyHpBar(0); 

      typeWriter(`【場景事件】遇到了服務使用者【${client.name}】。${client.description} 經理該如何配對合適的社會處方？`, () => {
        renderOptions(client.options);
      });
    }

    function renderOptions(options) {
      const box = document.getElementById('options-box');
      box.innerHTML = '';
      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'action-btn';
        btn.innerText = opt.text;
        btn.onclick = () => { if(!isTyping) handleAnswer(opt); };
        box.appendChild(btn);
      });
    }

    function handleAnswer(option) {
      const client = clients[currentIdx];
      totalScore += option.score;
      if(totalScore > 100) totalScore = 100;

      // 核心邏輯：根據得分即時切換高清像素頭像的「表情變化」
      document.getElementById('enemy-position').innerHTML = generateHQPixelAvatar(client.name, client.age, client.sex, option.score);
      
      // 動態特效分級：
      const enemyContainer = document.getElementById('enemy-position');
      if(option.score === 10) {
        // 滿分狂喜：觸發跳躍動畫 (Jump)
        enemyContainer.classList.add('animate-jump');
        setTimeout(() => enemyContainer.classList.remove('animate-jump'), 1200);
      } else {
        // 其餘遞減分數：觸發冇咁高興的受傷/震動動畫 (Shake)
        enemyContainer.classList.add('animate-shake');
        setTimeout(() => enemyContainer.classList.remove('animate-shake'), 400);
      }

      // 更新雙方血條狀態
      updateEnemyHpBar(option.score);
      updatePlayerHpBar(totalScore);

      // 爆發粒子特效
      spawnParticles(option.type || 'grass');

      document.getElementById('options-box').innerHTML = '';
      typeWriter(`【處方效果】${option.feedback} （健康值 +${option.score}，全健累積總分已達 ${totalScore} 分！）`, () => {
        const nextBtn = document.createElement('button');
        nextBtn.className = 'action-btn full-width-next';
        nextBtn.innerText = currentIdx === clients.length - 1 ? '完成10日特訓・查看結算報告 🏁' : '引入下一位服務使用者 ▶';
        nextBtn.onclick = () => { currentIdx++; initRound(); };
        document.getElementById('options-box').appendChild(nextBtn);
      });
    }

    function spawnParticles(type) {
      let color = '#51da46';
      if(type === 'fire') color = '#ff4500';
      if(type === 'water') color = '#1e90ff';
      if(type === 'electric') color = '#ffd700';

      for(let i=0; i<18; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.backgroundColor = color;
        p.style.left = '130px';
        p.style.bottom = '90px';
        p.style.setProperty('--mx', (Math.random() - 0.2) * 260 + 'px');
        p.style.setProperty('--my', (Math.random() - 0.8) * 190 + 'px');
        document.getElementById('particle-container').appendChild(p);
        setTimeout(() => p.remove(), 700);
      }
    }

    function toggleEnvironment() {
      const stage = document.getElementById('battle-stage');
      if(envType === 'home') {
        stage.style.setProperty('--pixel-bg', "linear-gradient(to bottom, #111e38, #3b5998), url('https://img.itch.zone/aW1nLzExNDY4Mzc3LnBuZw==/original/6v7F3n.png')");
        envType = 'nature';
      } else {
        stage.style.setProperty('--pixel-bg', "linear-gradient(to bottom, #87CEEB, #E0F6FF), url('https://img.itch.zone/aW1nLzU3MTY0MDAucG5n/original/x21p04.png')");
        envType = 'home';
      }
    }

    function toggleAudio() {
      const audio = document.getElementById('bgm');
      currentBgmStatus = !currentBgmStatus;
      if(currentBgmStatus) {
        audio.play().catch(() => {});
        document.getElementById('btn-audio').innerText = "🎵 背景音樂: 播放中";
      } else {
        audio.pause();
        document.getElementById('btn-audio').innerText = "🎵 背景音樂: 關閉";
      }
    }

    function endGame() {
      document.getElementById('battle-stage').style.display = 'none';
      document.getElementById('control-section').style.display = 'none';
      document.getElementById('summary-screen').style.display = 'block';

      let msg = '';
      if(totalScore <= 50) msg = `最終累積全健指數：${totalScore}分。你對各階層街坊的個別化痛點抓得不夠精準，配對處方略顯吃力。多回顧全健綜合大樓的核心指南，繼續加油！💪🏻`;
      else if(totalScore <= 80) msg = `最終累積全健指數：${totalScore}分。表現出眾！你已經能妥善調配地區網絡資源，並給予大眾合適的介入手段，是位非常優秀的全健經理！👀`;
      else msg = `最終累積全健指數：${totalScore}分！滿分傳奇！你對社會處方的宏觀架構與個人微觀偏好瞭如指掌，成功激發全社區的健康動機，完美掌舵大樓！👏🏻`;
      
      document.getElementById('summary-text').innerText = msg;
    }

    function resetGame() {
      currentIdx = 0; totalScore = 0;
      document.getElementById('battle-stage').style.display = 'block';
      document.getElementById('control-section').style.display = 'grid';
      document.getElementById('summary-screen').style.display = 'none';
      updatePlayerHpBar(0);
      initRound();
    }

    window.onload = () => {
      updatePlayerHpBar(0);
      initRound();
    };
  </script>
</body>
</html>
